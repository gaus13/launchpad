name: CD - Deploy

on:
  workflow_run:
    workflows: [ "CI - Build and Test" ] #must match with ci name
    types: [ completed ]
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }} #this skips the cd part if ci fails

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push image to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/launchpad:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/launchpad:${{ github.event.workflow_run.head_sha }}

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/launchpad:latest
          docker stop launchpad || true
          docker rm   launchpad || true
          docker run -d \
            --name launchpad \
            --restart unless-stopped \
            -p 8000:8000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/launchpad:latest
          docker image prune -f
